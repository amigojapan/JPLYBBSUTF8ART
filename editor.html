<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Braille ASCII Editor</title>

<style>
body {
  margin:0;
  background:#111;
  color:#eee;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#toolbar {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
}

.colorBtn {
  width:28px;
  height:28px;
  border:2px solid #444;
}

.colorBtn.active {
  border:2px solid #fff;
}

canvas {
  touch-action:none;
  background:#000;
}

#output {
  width:95%;
  height:200px;
  background:#000;
  color:#0f0;
  margin-top:10px;
  padding:10px;
  overflow:auto;
  white-space:pre;
}

button {
  margin:5px;
}
</style>

</head>

<body>

<div id="toolbar"></div>
<canvas id="canvas"></canvas>

<div>
  <button onclick="clearGrid()">Clear</button>
  <button onclick="exportBraille()">Export</button>
  <button onclick="copyOutput()">Copy</button>
</div>

<pre id="output"></pre>

<script>
// ===== PALETTE =====
function getColor(n) {
    const table = {
        0:"#000000",
        1:"#ffffff",
        2:"#808080",
        3:"#659BDF",
        4:"#a9a9a9",
        7:"#c0c0c0",
        8:"#dda0dd",
        9:"#ee82ee",
        10:"#ff0000",
        11:"#ffa500",
        12:"#ffff00",
        13:"#008000",
        14:"#0000ff",
        15:"#4b0082",
        16:"#800080"
    };
    return table.hasOwnProperty(n) ? table[n] : "#000000";
}

// ===== CONFIG =====
const W = 80;
const H = 40;
const PIX = 10;

let currentColor = 10;

// ===== GRID =====
let grid = Array.from({length:H}, () =>
  Array.from({length:W}, () => ({on:0,color:0}))
);

// ===== CANVAS =====
const canvas = document.getElementById("canvas");
canvas.width = W * PIX;
canvas.height = H * PIX;
const ctx = canvas.getContext("2d");

// ===== DRAW GRID =====
function render() {
  for (let y=0;y<H;y++) {
    for (let x=0;x<W;x++) {
      let p = grid[y][x];
      ctx.fillStyle = p.on ? getColor(p.color) : "#000";
      ctx.fillRect(x*PIX,y*PIX,PIX,PIX);
    }
  }
}

// ===== INPUT =====
let drawing = false;

function drawAt(e) {
  const rect = canvas.getBoundingClientRect();
  let x = Math.floor((e.clientX - rect.left)/PIX);
  let y = Math.floor((e.clientY - rect.top)/PIX);

  if (grid[y] && grid[y][x]) {
    grid[y][x] = {on:1,color:currentColor};
    render();
  }
}

canvas.addEventListener("mousedown", e => {
  drawing = true;
  drawAt(e);
});

canvas.addEventListener("mousemove", e => {
  if (drawing) drawAt(e);
});

window.addEventListener("mouseup", ()=> drawing=false);

// TOUCH
canvas.addEventListener("touchstart", e => {
  drawing = true;
  drawAt(e.touches[0]);
});

canvas.addEventListener("touchmove", e => {
  drawAt(e.touches[0]);
});

canvas.addEventListener("touchend", ()=> drawing=false);

// ===== PALETTE UI =====
const toolbar = document.getElementById("toolbar");

for (let i=0;i<=16;i++) {
  let btn = document.createElement("div");
  btn.className = "colorBtn";
  btn.style.background = getColor(i);
  btn.onclick = ()=>{
    currentColor = i;
    document.querySelectorAll(".colorBtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  };
  if (i===currentColor) btn.classList.add("active");
  toolbar.appendChild(btn);
}

// ===== BRAILLE =====
const dots = [
  [0,0,1],[0,1,2],[0,2,4],
  [1,0,8],[1,1,16],[1,2,32],
  [0,3,64],[1,3,128]
];

function getFG(block){
  let count={};
  for (let p of block){
    if(p.on) count[p.color]=(count[p.color]||0)+1;
  }
  let best=1,max=-1;
  for(let c in count){
    if(count[c]>max){max=count[c];best=parseInt(c);}
  }
  return best;
}

function convert() {
  let out="";
  let lastFG=null,lastBG=null;

  for(let y=0;y<H;y+=4){
    for(let x=0;x<W;x+=2){

      let block=[];
      for(let dy=0;dy<4;dy++){
        for(let dx=0;dx<2;dx++){
          let p=grid[y+dy]?.[x+dx];
          if(p) block.push(p);
        }
      }

      let fgc=getFG(block);
      let bgc=0;

      let code=0;
      for(let d of dots){
        let p=grid[y+d[1]]?.[x+d[0]];
        if(p && p.on && p.color===fgc) code|=d[2];
      }

      let ch=String.fromCharCode(0x2800+code);

      if(fgc!==lastFG || bgc!==lastBG){
        out+=`[C${fgc},${bgc}]`;
        lastFG=fgc;
        lastBG=bgc;
      }

      out+=ch;
    }
    out+="\n";
  }

  return out;
}

// ===== ACTIONS =====
function exportBraille(){
  document.getElementById("output").textContent = convert();
}

function copyOutput(){
  navigator.clipboard.writeText(convert());
}

function clearGrid(){
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      grid[y][x]={on:0,color:0};
    }
  }
  render();
}

// init
render();

</script>

</body>
</html>
